name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Give the GITHUB_TOKEN just enough to publish the deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; queued ones cancel in-flight pre-deploy jobs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: bun run build

      # GitHub Pages serves 404.html on any unmatched path — by copying index.html
      # we let the SPA handle client-side routes like /weighted on direct navigation/refresh.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
